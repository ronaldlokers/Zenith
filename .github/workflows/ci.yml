name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check generated Worker types are up to date
        run: npx wrangler types --check

      - name: Typecheck and build
        run: npm run build

      - name: API integration tests
        run: npm test

  preview:
    if: github.event_name == 'pull_request'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vite build

      - name: Upload preview version
        id: preview
        run: |
          OUTPUT=$(npx wrangler versions upload --preview-alias "pr-${{ github.event.pull_request.number }}" --message "PR #${{ github.event.pull_request.number }}")
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE 'https://pr-[^ ]+\.workers\.dev' | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.preview.outputs.url }}`;
            const body = url
              ? `Preview deployed (behind Cloudflare Access, same as production): ${url}`
              : "Preview upload ran but no preview URL was found in the wrangler output — check the workflow log.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
