<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        max-width: 460px;
        margin: 2rem auto;
        padding: 0 1.25rem;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #1c1a28;
      }
      h1 {
        font-size: 1.2rem;
      }
      p {
        color: #63607a;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      label {
        display: block;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #63607a;
        margin: 1rem 0 0.3rem;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        font: inherit;
        padding: 0.5rem 0.6rem;
        border: 1px solid #e4e0d5;
        border-radius: 8px;
      }
      button {
        margin-top: 1.2rem;
        padding: 0.55rem 1rem;
        border: none;
        border-radius: 8px;
        background: #a9781f;
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      #saved {
        margin-left: 0.6rem;
        color: #2f7d4f;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <h1>Zenith — Save Job</h1>
    <p>
      Point this at your Zenith instance and paste a read/write API key. Create
      a key in Zenith under <strong>Settings → Integrations</strong>.
    </p>
    <label for="baseUrl">Zenith URL</label>
    <input id="baseUrl" type="text" placeholder="https://your-zenith.example" />
    <label for="apiKey">API key</label>
    <input id="apiKey" type="password" placeholder="paste your API key" />
    <div>
      <button id="save">Save</button>
      <span id="saved"></span>
    </div>
    <script src="options.js"></script>
  </body>
</html>
